<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion - Makzaz Global Store</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --fashion-primary: #E91E63;
            --fashion-bg: linear-gradient(135deg, #FFF5F7, #FFE4EC);
            --fashion-card: #FFFFFF;
            --fashion-accent: #FF4081;
        }

        body {
            background: var(--fashion-bg);
            font-family: 'Poppins', 'Inter', system-ui, sans-serif;
            overflow-x: hidden;
        }

        .fashion-hero {
            background: linear-gradient(135deg, #E91E63 0%, #FF80AB 100%);
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-radius: 0 0 30px 30px;
            margin-bottom: 2rem;
        }

        .fashion-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="2" fill="rgba(255,255,255,0.1)"/></svg>');
            background-size: 30px 30px;
        }

        .fashion-hero h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .fashion-hero p {
            font-size: 1.1rem;
            position: relative;
            z-index: 1;
            opacity: 0.95;
        }

        .fashion-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            padding: 1rem 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border-radius: 20px;
            margin: 0 auto 2rem;
            max-width: 1400px;
        }

        .fashion-nav ul {
            display: flex;
            justify-content: center;
            gap: 2rem;
            list-style: none;
            flex-wrap: wrap;
            padding: 0 1rem;
        }

        .fashion-nav a {
            color: var(--deep-brown);
            text-decoration: none;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
        }

        .fashion-nav a:hover {
            background: rgba(233, 30, 99, 0.1);
            color: var(--fashion-primary);
            transform: translateY(-2px);
        }

        .fashion-nav i {
            font-size: 1.5rem;
            color: var(--fashion-primary);
        }

        .fashion-filters {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 1.5rem;
            margin: 0 auto 2rem;
            max-width: 1400px;
            border-radius: 20px;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            border: 1px solid rgba(233, 30, 99, 0.1);
        }

        .fashion-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            padding: 1rem;
            max-width: 1400px;
            margin: 0 auto 3rem;
        }

        .fashion-card {
            background: var(--fashion-card);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            cursor: pointer;
        }

        .fashion-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(233, 30, 99, 0.2);
        }

        .fashion-img {
            height: 320px;
            width: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .fashion-card:hover .fashion-img {
            transform: scale(1.05);
        }

        .badge-new {
            position: absolute;
            top: 12px;
            left: 12px;
            background: linear-gradient(135deg, var(--fashion-primary), var(--fashion-accent));
            color: white;
            padding: 0.4rem 0.9rem;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(233, 30, 99, 0.3);
        }

        .fashion-info {
            padding: 1.25rem;
        }

        .fashion-brand {
            color: var(--fashion-primary);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .fashion-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--deep-brown);
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .fashion-price {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--fashion-primary);
        }

        .add-cart-btn {
            background: linear-gradient(135deg, var(--fashion-primary), var(--fashion-accent));
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .add-cart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(233, 30, 99, 0.4);
        }

        .size-filter select, .filter-select {
            padding: 0.6rem 1rem;
            border: 2px solid rgba(233, 30, 99, 0.2);
            border-radius: 60px;
            outline: none;
            background: white;
            color: var(--deep-brown);
            font-weight: 500;
            transition: all 0.3s;
        }

        .size-filter select:focus, .filter-select:focus {
            border-color: var(--fashion-primary);
            box-shadow: 0 0 0 3px rgba(233, 30, 99, 0.1);
        }

        @media (max-width: 767px) {
            .fashion-hero { height: 200px; border-radius: 0 0 20px 20px; }
            .fashion-hero h1 { font-size: 1.75rem; }
            .fashion-hero p { font-size: 0.9rem; }
            .fashion-nav ul { gap: 1rem; }
            .fashion-nav i { font-size: 1.2rem; }
            .fashion-filters { padding: 1rem; gap: 1rem; }
            .fashion-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
            .fashion-img { height: 200px; }
        }
    </style>
</head>
<body>
    
    <!-- Header Component -->
    <div id="header-placeholder"></div>

    <div class="fashion-hero">
        <h1><i class="fas fa-tshirt"></i> Fashion Collection</h1>
        <p>Discover the latest trends in style</p>
    </div>

    <div class="fashion-nav">
        <ul>
            <li><a href="#"><i class="fas fa-female"></i>Women</a></li>
            <li><a href="#"><i class="fas fa-male"></i>Men</a></li>
            <li><a href="#"><i class="fas fa-child"></i>Kids</a></li>
            <li><a href="#"><i class="fas fa-hat-cowboy"></i>Accessories</a></li>
            <li><a href="#"><i class="fas fa-shoe-prints"></i>Shoes</a></li>
            <li><a href="#"><i class="fas fa-gem"></i>Jewelry</a></li>
        </ul>
    </div>

    <div class="fashion-filters">
        <div class="size-filter">
            <label>Size:</label>
            <select>
                <option>All Sizes</option>
                <option>XS</option>
                <option>S</option>
                <option>M</option>
                <option>L</option>
                <option>XL</option>
                <option>XXL</option>
            </select>
        </div>
        <div class="size-filter">
            <label>Color:</label>
            <select>
                <option>All Colors</option>
                <option>Black</option>
                <option>White</option>
                <option>Red</option>
                <option>Blue</option>
                <option>Green</option>
            </select>
        </div>
        <div class="size-filter">
            <label>Price:</label>
            <select>
                <option>All Prices</option>
                <option>Under $50</option>
                <option>$50 - $100</option>
                <option>$100 - $200</option>
                <option>Over $200</option>
            </select>
        </div>
        <div class="size-filter">
            <label>Brand:</label>
            <select>
                <option>All Brands</option>
                <option>Zara</option>
                <option>H&M</option>
                <option>Nike</option>
                <option>Adidas</option>
            </select>
        </div>
    </div>

    <div class="fashion-grid" id="fashionGrid">
        <!-- Products injected by JS -->
    </div>

    <!-- Footer Component -->
    <div id="footer-placeholder"></div>

    <!-- Back to Top -->
    <button id="backToTop">↑</button>
    
    <!-- WhatsApp Floating Button -->
    <a href="https://wa.me/1234567890" class="whatsapp-float" target="_blank" rel="noopener noreferrer" aria-label="Chat on WhatsApp">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script src="../../app.js"></script>
    <script>
        // Load header and footer components
        fetch('../../components/header.html')
            .then(r => r.text())
            .then(html => document.getElementById('header-placeholder').innerHTML = html);
        
        fetch('../../components/footer.html')
            .then(r => r.text())
            .then(html => document.getElementById('footer-placeholder').innerHTML = html);

        // Fashion products data
        const fashionProducts = [
            { id: 201, title: 'Floral Summer Dress', brand: 'ZARA', price: 89.99, originalPrice: 119.99, rating: 4.5, image: 'https://picsum.photos/400/500?random=201', badge: 'NEW' },
            { id: 202, title: 'Classic White Shirt', brand: 'H&M', price: 45.00, originalPrice: 59.99, rating: 4.3, image: 'https://picsum.photos/400/500?random=202', badge: '' },
            { id: 203, title: 'Air Max Sneakers', brand: 'NIKE', price: 129.99, originalPrice: 159.99, rating: 4.8, image: 'https://picsum.photos/400/500?random=203', badge: 'HOT' },
            { id: 204, title: 'Denim Jacket', brand: 'ADIDAS', price: 75.50, originalPrice: 95.00, rating: 4.4, image: 'https://picsum.photos/400/500?random=204', badge: 'SALE' },
            { id: 205, title: 'Leather Handbag', brand: 'GUCCI', price: 899.99, originalPrice: 1099.99, rating: 4.9, image: 'https://picsum.photos/400/500?random=205', badge: 'NEW' },
            { id: 206, title: 'Silk Scarf', brand: 'HERMES', price: 299.99, originalPrice: 349.99, rating: 4.7, image: 'https://picsum.photos/400/500?random=206', badge: '' },
            { id: 207, title: 'Running Shorts', brand: 'UNDER ARMOUR', price: 39.99, originalPrice: 49.99, rating: 4.2, image: 'https://picsum.photos/400/500?random=207', badge: '' },
            { id: 208, title: 'Wool Sweater', brand: 'UNIQLO', price: 59.99, originalPrice: 79.99, rating: 4.6, image: 'https://picsum.photos/400/500?random=208', badge: 'NEW' }
        ];

        // Render fashion products
        function renderFashionProducts() {
            const container = document.getElementById('fashionGrid');
            if (!container) return;
            
            const fragment = document.createDocumentFragment();
            fashionProducts.forEach(product => {
                const card = createProductCard(product);
                card.querySelector('.product-image img').style.objectFit = 'cover';
                card.querySelector('.product-image img').style.height = '320px';
                fragment.appendChild(card);
            });
            container.appendChild(fragment);
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderFashionProducts();
        });
    </script>
</body>
</html>
