<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electronics - Makzaz Global Store</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --tech-primary: #2196F3;
            --tech-dark: #1565C0;
            --tech-bg: linear-gradient(135deg, #E3F2FD, #BBDEFB);
            --tech-card: #FFFFFF;
            --tech-accent: #03A9F4;
        }

        body {
            background: var(--tech-bg);
            font-family: 'Poppins', 'Inter', system-ui, sans-serif;
            overflow-x: hidden;
        }

        .tech-hero {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-radius: 0 0 30px 30px;
            margin-bottom: 2rem;
        }

        .tech-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M0 0 L100 100 M100 0 L0 100" stroke="rgba(255,255,255,0.05)" stroke-width="1"/></svg>');
            background-size: 50px 50px;
        }

        .tech-hero h1 {
            font-size: 2.3rem;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 800;
        }

        .tech-hero p {
            font-size: 1rem;
            position: relative;
            z-index: 1;
            color: #90CAF9;
        }

        .tech-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 1rem 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border-radius: 20px;
            margin: 0 auto 2rem;
            max-width: 1400px;
        }

        .tech-nav ul {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            list-style: none;
            flex-wrap: wrap;
            padding: 0 1rem;
        }

        .tech-nav a {
            color: var(--deep-brown);
            text-decoration: none;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            font-size: 0.85rem;
        }

        .tech-nav a:hover {
            background: rgba(33, 150, 243, 0.1);
            color: var(--tech-primary);
            transform: translateY(-2px);
        }

        .tech-nav i {
            font-size: 1.5rem;
            color: var(--tech-primary);
        }

        .tech-filters {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 1.5rem;
            margin: 0 auto 2rem;
            max-width: 1400px;
            border-radius: 20px;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            border: 1px solid rgba(33, 150, 243, 0.15);
        }

        .tech-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            padding: 1rem;
            max-width: 1400px;
            margin: 0 auto 3rem;
        }

        .tech-card {
            background: var(--tech-card);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            cursor: pointer;
            border: 1px solid rgba(33, 150, 243, 0.1);
        }

        .tech-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(33, 150, 243, 0.2);
            border-color: var(--tech-primary);
        }

        .tech-img {
            height: 220px;
            width: 100%;
            object-fit: contain;
            background: #FAFAFA;
            padding: 1.5rem;
            transition: transform 0.4s;
        }

        .tech-card:hover .tech-img {
            transform: scale(1.05);
        }

        .badge-tech {
            position: absolute;
            top: 12px;
            right: 12px;
            background: linear-gradient(135deg, var(--tech-dark), var(--tech-primary));
            color: white;
            padding: 0.4rem 0.9rem;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
        }

        .tech-info {
            padding: 1.25rem;
        }

        .tech-brand {
            color: var(--tech-primary);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .tech-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--deep-brown);
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .tech-specs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .spec-tag {
            background: rgba(33, 150, 243, 0.1);
            color: var(--tech-dark);
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .tech-price {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--tech-dark);
        }

        .add-cart-btn {
            background: linear-gradient(135deg, var(--tech-primary), var(--tech-accent));
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .add-cart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(33, 150, 243, 0.4);
        }

        .filter-select {
            padding: 0.6rem 1rem;
            border: 2px solid rgba(33, 150, 243, 0.2);
            border-radius: 60px;
            outline: none;
            background: white;
            color: var(--deep-brown);
            font-weight: 500;
            transition: all 0.3s;
        }

        .filter-select:focus {
            border-color: var(--tech-primary);
            box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1);
        }

        @media (max-width: 767px) {
            .tech-hero { height: 200px; border-radius: 0 0 20px 20px; }
            .tech-hero h1 { font-size: 1.5rem; }
            .tech-hero p { font-size: 0.85rem; }
            .tech-nav ul { gap: 0.75rem; }
            .tech-nav i { font-size: 1.2rem; }
            .tech-filters { padding: 1rem; gap: 1rem; }
            .tech-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
            .tech-img { height: 180px; }
        }
    </style>
</head>
<body>
    
    <!-- Header Component -->
    <div id="header-placeholder"></div>

    <div class="tech-hero">
        <h1><i class="fas fa-microchip"></i> Electronics</h1>
        <p>Cutting-edge technology for modern life</p>
    </div>

    <div class="tech-nav">
        <ul>
            <li><a href="#"><i class="fas fa-laptop"></i>Laptops</a></li>
            <li><a href="#"><i class="fas fa-mobile-alt"></i>Phones</a></li>
            <li><a href="#"><i class="fas fa-headphones"></i>Audio</a></li>
            <li><a href="#"><i class="fas fa-camera"></i>Cameras</a></li>
            <li><a href="#"><i class="fas fa-gamepad"></i>Gaming</a></li>
            <li><a href="#"><i class="fas fa-tv"></i>TVs</a></li>
            <li><a href="#"><i class="fas fa-clock"></i>Wearables</a></li>
        </ul>
    </div>

    <div class="tech-filters">
        <div>
            <label>Brand:</label>
            <select class="filter-select">
                <option>All Brands</option>
                <option>Apple</option>
                <option>Samsung</option>
                <option>Sony</option>
                <option>Dell</option>
                <option>HP</option>
            </select>
        </div>
        <div>
            <label>Price Range:</label>
            <select class="filter-select">
                <option>All Prices</option>
                <option>Under $500</option>
                <option>$500 - $1000</option>
                <option>$1000 - $2000</option>
                <option>Over $2000</option>
            </select>
        </div>
        <div>
            <label>Rating:</label>
            <select class="filter-select">
                <option>All Ratings</option>
                <option>4★ & Up</option>
                <option>3★ & Up</option>
            </select>
        </div>
        <div>
            <label>Availability:</label>
            <select class="filter-select">
                <option>All Items</option>
                <option>In Stock</option>
                <option>Pre-order</option>
            </select>
        </div>
    </div>

    <div class="tech-grid" id="techGrid">
        <!-- Products injected by JS -->
    </div>

    <!-- Footer Component -->
    <div id="footer-placeholder"></div>

    <!-- Back to Top -->
    <button id="backToTop">↑</button>
    
    <!-- WhatsApp Floating Button -->
    <a href="https://wa.me/1234567890" class="whatsapp-float" target="_blank" rel="noopener noreferrer" aria-label="Chat on WhatsApp">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script src="../../app.js"></script>
    <script>
        // Load header and footer components
        fetch('../../components/header.html')
            .then(r => r.text())
            .then(html => document.getElementById('header-placeholder').innerHTML = html);
        
        fetch('../../components/footer.html')
            .then(r => r.text())
            .then(html => document.getElementById('footer-placeholder').innerHTML = html);

        // Electronics products data
        const techProducts = [
            { id: 301, title: 'MacBook Pro 16" M3 Max', brand: 'APPLE', price: 3499, originalPrice: 3999, rating: 4.9, image: 'https://picsum.photos/400/400?random=301', badge: 'NEW' },
            { id: 302, title: 'Galaxy S24 Ultra 5G', brand: 'SAMSUNG', price: 1299, originalPrice: 1499, rating: 4.8, image: 'https://picsum.photos/400/400?random=302', badge: 'HOT' },
            { id: 303, title: 'WH-1000XM5 Wireless Headphones', brand: 'SONY', price: 399, originalPrice: 449, rating: 4.7, image: 'https://picsum.photos/400/400?random=303', badge: '' },
            { id: 304, title: 'Apple Watch Series 9', brand: 'APPLE', price: 429, originalPrice: 499, rating: 4.6, image: 'https://picsum.photos/400/400?random=304', badge: 'SALE' },
            { id: 305, title: 'Dell XPS 15 Laptop', brand: 'DELL', price: 1899, originalPrice: 2199, rating: 4.5, image: 'https://picsum.photos/400/400?random=305', badge: 'NEW' },
            { id: 306, title: 'PlayStation 5 Console', brand: 'SONY', price: 499, originalPrice: 549, rating: 4.9, image: 'https://picsum.photos/400/400?random=306', badge: 'HOT' },
            { id: 307, title: 'iPad Pro 12.9"', brand: 'APPLE', price: 1099, originalPrice: 1299, rating: 4.8, image: 'https://picsum.photos/400/400?random=307', badge: '' },
            { id: 308, title: 'Samsung 65" QLED TV', brand: 'SAMSUNG', price: 1799, originalPrice: 2299, rating: 4.7, image: 'https://picsum.photos/400/400?random=308', badge: 'SALE' }
        ];

        // Render tech products
        function renderTechProducts() {
            const container = document.getElementById('techGrid');
            if (!container) return;
            
            const fragment = document.createDocumentFragment();
            techProducts.forEach(product => {
                const card = createProductCard(product);
                card.querySelector('.product-image img').style.objectFit = 'contain';
                card.querySelector('.product-image img').style.height = '220px';
                card.querySelector('.product-image img').style.padding = '1.5rem';
                card.querySelector('.product-image img').style.background = '#FAFAFA';
                fragment.appendChild(card);
            });
            container.appendChild(fragment);
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTechProducts();
        });
    </script>

  <!-- Mobile Bottom Navigation -->
  <nav class="mobile-nav">

      <i class="fas fa-home"></i>
      <span>Home</span>

  </nav>

  </body>
</html>
