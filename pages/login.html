<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | MAKZAZ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <style>
    .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-body); padding: 20px; }
    .auth-card { background: var(--bg-card); padding: 40px; border-radius: var(--radius); box-shadow: var(--shadow); max-width: 450px; width: 100%; }
    .auth-logo { text-align: center; margin-bottom: 30px; }
    .auth-logo h1 { color: var(--primary); font-size: 28px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-body); color: var(--text-main); }
    .btn-primary { width: 100%; background: var(--primary); color: white; padding: 14px; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; transition: var(--transition); border: none; }
    .btn-primary:hover { background: var(--primary-dark); }
    .auth-footer { text-align: center; margin-top: 20px; color: var(--text-muted); }
    .auth-footer a { color: var(--primary); font-weight: 600; }
    .social-login { display: flex; gap: 10px; margin-top: 20px; }
    .social-btn { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-body); cursor: pointer; transition: var(--transition); }
    .social-btn:hover { background: var(--bg-glass); }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon" style="margin: 0 auto 15px; width: 60px; height: 60px; font-size: 28px;">
          <i class="fas fa-african-tree"></i>
        </div>
        <h1>Welcome Back!</h1>
        <p style="color: var(--text-muted);">Login to your MAKZAZ account</p>
      </div>
      
      <form onsubmit="event.preventDefault(); window.location.href='../index.html';">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="your@email.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••" required />
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 13px;">
          <label><input type="checkbox" /> Remember me</label>
          <a href="#" style="color: var(--primary);">Forgot password?</a>
        </div>
        <button type="submit" class="btn-primary">Login</button>
      </form>

      <div class="social-login">
        <button class="social-btn"><i class="fab fa-google"></i></button>
        <button class="social-btn"><i class="fab fa-facebook"></i></button>
        <button class="social-btn"><i class="fab fa-apple"></i></button>
      </div>

      <div class="auth-footer">
        <p>Don't have an account? <a href="signup.html">Sign up</a></p>
      </div>
    </div>
  </div>
  <script src="../app.js"></script>
</body>
</html>
