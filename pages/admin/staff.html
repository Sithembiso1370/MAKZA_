<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Management | MAKZAZ Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../styles.css" />
  <style>
    .admin-layout { display: grid; grid-template-columns: 250px 1fr; min-height: 100vh; }
    .admin-sidebar { background: var(--bg-card); padding: 20px; border-right: 1px solid var(--border); }
    .admin-nav a { display: block; padding: 12px 15px; margin-bottom: 8px; border-radius: var(--radius-sm); color: var(--text-main); transition: var(--transition); }
    .admin-nav a:hover, .admin-nav a.active { background: var(--primary); color: white; }
    .admin-nav a i { width: 25px; }
    .admin-content { padding: 30px; background: var(--bg-body); }
    .staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .staff-card { background: var(--bg-card); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); text-align: center; }
    .staff-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; }
    .role-badge { padding: 5px 12px; border-radius: var(--radius-full); font-size: 12px; font-weight: 600; display: inline-block; margin-bottom: 10px; }
    .role-admin { background: #fee2e2; color: #991b1b; }
    .role-manager { background: #dbeafe; color: #1e40af; }
    .role-staff { background: #d1fae5; color: #065f46; }
    @media (max-width: 768px) { .admin-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <a href="../../index.html" class="logo" style="margin-bottom: 30px;">
        <div class="logo-icon"><i class="fas fa-african-tree"></i></div>
        <h1 style="font-size: 20px;">MAKZAZ Admin</h1>
      </a>
      <nav class="admin-nav">
        <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="products.html"><i class="fas fa-box"></i> Products</a>
        <a href="orders.html"><i class="fas fa-shopping-bag"></i> Orders</a>
        <a href="customers.html"><i class="fas fa-users"></i> Customers</a>
        <a href="suppliers.html"><i class="fas fa-truck"></i> Suppliers</a>
        <a href="staff.html" class="active"><i class="fas fa-user-tie"></i> Staff</a>
        <a href="carts.html"><i class="fas fa-shopping-cart"></i> Carts</a>
        <a href="../index.html"><i class="fas fa-home"></i> Back to Site</a>
      </nav>
    </aside>
    <main class="admin-content">
      <h2><i class="fas fa-user-tie"></i> Staff Management</h2>
      <div class="staff-grid">
        <div class="staff-card">
          <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200" class="staff-avatar"/>
          <span class="role-badge role-admin">Admin</span>
          <h3>Nomsa M.</h3>
          <p>nomsa@makzaz.com</p>
          <p>Last active: Today</p>
        </div>
        <div class="staff-card">
          <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=200" class="staff-avatar"/>
          <span class="role-badge role-manager">Manager</span>
          <h3>John D.</h3>
          <p>john@makzaz.com</p>
          <p>Last active: Yesterday</p>
        </div>
        <div class="staff-card">
          <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=200" class="staff-avatar"/>
          <span class="role-badge role-staff">Staff</span>
          <h3>Sarah K.</h3>
          <p>sarah@makzaz.com</p>
          <p>Last active: 2 days ago</p>
        </div>
      </div>
    </main>
  </div>
  <script src="../../app.js"></script>
</body>
</html>
