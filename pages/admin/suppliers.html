<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suppliers | MAKZAZ Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../styles.css" />
  <style>
    .admin-layout { display: grid; grid-template-columns: 250px 1fr; min-height: 100vh; }
    .admin-sidebar { background: var(--bg-card); padding: 20px; border-right: 1px solid var(--border); }
    .admin-nav a { display: block; padding: 12px 15px; margin-bottom: 8px; border-radius: var(--radius-sm); color: var(--text-main); transition: var(--transition); }
    .admin-nav a:hover, .admin-nav a.active { background: var(--primary); color: white; }
    .admin-nav a i { width: 25px; }
    .admin-content { padding: 30px; background: var(--bg-body); }
    .supplier-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .supplier-card { background: var(--bg-card); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); }
    .supplier-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
    .supplier-logo { width: 60px; height: 60px; border-radius: var(--radius-sm); object-fit: cover; }
    .status-badge { padding: 5px 12px; border-radius: var(--radius-full); font-size: 12px; font-weight: 600; }
    .status-active { background: #d1fae5; color: #065f46; }
    @media (max-width: 768px) { .admin-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <a href="../../index.html" class="logo" style="margin-bottom: 30px;">
        <div class="logo-icon"><i class="fas fa-african-tree"></i></div>
        <h1 style="font-size: 20px;">MAKZAZ Admin</h1>
      </a>
      <nav class="admin-nav">
        <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="products.html"><i class="fas fa-box"></i> Products</a>
        <a href="orders.html"><i class="fas fa-shopping-bag"></i> Orders</a>
        <a href="customers.html"><i class="fas fa-users"></i> Customers</a>
        <a href="suppliers.html" class="active"><i class="fas fa-truck"></i> Suppliers</a>
        <a href="staff.html"><i class="fas fa-user-tie"></i> Staff</a>
        <a href="carts.html"><i class="fas fa-shopping-cart"></i> Carts</a>
        <a href="../index.html"><i class="fas fa-home"></i> Back to Site</a>
      </nav>
    </aside>
    <main class="admin-content">
      <h2><i class="fas fa-truck"></i> Supplier Management</h2>
      <div class="supplier-grid">
        <div class="supplier-card">
          <div class="supplier-header">
            <img src="https://images.unsplash.com/photo-1531384441138-2736e62e0919?w=100" class="supplier-logo"/>
            <div><h3>Kente Masters</h3><span class="status-badge status-active">Active</span></div>
          </div>
          <p><i class="fas fa-map-marker-alt"></i> Accra, Ghana</p>
          <p><i class="fas fa-box"></i> 25 Products</p>
          <p><i class="fas fa-star"></i> 4.8 Rating</p>
        </div>
        <div class="supplier-card">
          <div class="supplier-header">
            <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=100" class="supplier-logo"/>
            <div><h3>AfriTech</h3><span class="status-badge status-active">Active</span></div>
          </div>
          <p><i class="fas fa-map-marker-alt"></i> Lagos, Nigeria</p>
          <p><i class="fas fa-box"></i> 18 Products</p>
          <p><i class="fas fa-star"></i> 4.6 Rating</p>
        </div>
      </div>
    </main>
  </div>
  <script src="../../app.js"></script>

  <!-- Mobile Bottom Navigation -->
  <nav class="mobile-nav">
    <a href="../index.html" class="mobile-nav-item">
      <i class="fas fa-home"></i>
      <span>Home</span>
    </a>
    <a href="categories/all-categories.html" class="mobile-nav-item">
      <i class="fas fa-th-large"></i>
      <span>Categories</span>
    </a>
    <a href="stories.html" class="mobile-nav-item">
      <i class="fas fa-circle"></i>
      <span>Stories</span>
    </a>
    <a href="profile.html" class="mobile-nav-item">
      <i class="fas fa-user"></i>
      <span>Account</span>
    </a>
  </nav>

  </body>
</html>
