<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customers | MAKZAZ Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../styles.css" />
  <style>
    .admin-layout { display: grid; grid-template-columns: 250px 1fr; min-height: 100vh; }
    .admin-sidebar { background: var(--bg-card); padding: 20px; border-right: 1px solid var(--border); }
    .admin-nav a { display: block; padding: 12px 15px; margin-bottom: 8px; border-radius: var(--radius-sm); color: var(--text-main); transition: var(--transition); }
    .admin-nav a:hover, .admin-nav a.active { background: var(--primary); color: white; }
    .admin-nav a i { width: 25px; }
    .admin-content { padding: 30px; background: var(--bg-body); }
    .admin-table { width: 100%; border-collapse: collapse; background: var(--bg-card); border-radius: var(--radius); overflow: hidden; }
    .admin-table th, .admin-table td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
    .admin-table th { background: var(--bg-glass); font-weight: 600; }
    .customer-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    @media (max-width: 768px) { .admin-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <a href="../../index.html" class="logo" style="margin-bottom: 30px;">
        <div class="logo-icon"><i class="fas fa-african-tree"></i></div>
        <h1 style="font-size: 20px;">MAKZAZ Admin</h1>
      </a>
      <nav class="admin-nav">
        <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="products.html"><i class="fas fa-box"></i> Products</a>
        <a href="orders.html"><i class="fas fa-shopping-bag"></i> Orders</a>
        <a href="customers.html" class="active"><i class="fas fa-users"></i> Customers</a>
        <a href="suppliers.html"><i class="fas fa-truck"></i> Suppliers</a>
        <a href="staff.html"><i class="fas fa-user-tie"></i> Staff</a>
        <a href="carts.html"><i class="fas fa-shopping-cart"></i> Carts</a>
        <a href="../index.html"><i class="fas fa-home"></i> Back to Site</a>
      </nav>
    </aside>
    <main class="admin-content">
      <h2><i class="fas fa-users"></i> Customer Management</h2>
      <table class="admin-table">
        <thead><tr><th>Customer</th><th>Email</th><th>Orders</th><th>Total Spent</th><th>Joined</th></tr></thead>
        <tbody>
          <tr><td><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100" class="customer-avatar"/> Nomsa M.</td><td>nomsa@email.com</td><td>12</td><td>R 8,450</td><td>Jan 2026</td></tr>
          <tr><td><img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100" class="customer-avatar"/> John D.</td><td>john@email.com</td><td>8</td><td>R 5,200</td><td>Feb 2026</td></tr>
          <tr><td><img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=100" class="customer-avatar"/> Sarah K.</td><td>sarah@email.com</td><td>15</td><td>R 12,300</td><td>Dec 2025</td></tr>
        </tbody>
      </table>
    </main>
  </div>
  <script src="../../app.js"></script>

  <!-- Mobile Bottom Navigation -->
  <nav class="mobile-nav">
    <a href="../index.html" class="mobile-nav-item">
      <i class="fas fa-home"></i>

    </a>
    <a href="categories/all-categories.html" class="mobile-nav-item">

    </a>

    <a href="profile.html" class="mobile-nav-item">
      <i class="fas fa-user"></i>
      <span>Account</span>
    </a>
  </nav>

  </body>
</html>
