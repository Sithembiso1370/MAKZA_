<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brand Page | MAKZAZ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <header class="header glass">
    <div class="container" style="display: flex; align-items: center; justify-content: space-between;">
      <a href="../index.html" class="logo">
        <div class="logo-icon"><i class="fas fa-african-tree"></i></div>
        <h1>MAKZAZ</h1>
      </a>
      <nav class="nav-links">
        <a href="#" class="nav-icon" title="Location"><i class="fas fa-map-marker-alt"></i></a>
        <a href="cart.html" class="nav-icon" title="Cart"><i class="fas fa-shopping-cart"></i><span class="badge" id="cartCount">0</span></a>
        <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="brand-header">
      <img src="https://picsum.photos/400/300?random=100" alt="Brand Banner" class="brand-banner" />
      <div class="brand-info">
        <img src="https://picsum.photos/400/300?random=100" alt="Brand Logo" class="brand-logo" />
        <h1>Kente Masters</h1>
        <p class="brand-tagline">Authentic African Textiles Since 2015</p>
        <div class="brand-meta">
          <span><i class="fas fa-star"></i> 4.8 (256 reviews)</span>
          <span><i class="fas fa-store"></i> Verified Seller</span>
          <span><i class="fas fa-map-marker-alt"></i> Accra, Ghana</span>
        </div>
        <button class="btn-cart"><i class="fas fa-following"></i> Follow Brand</button>
      </div>
    </div>

    <div class="brand-tabs">
      <button class="tab-btn active">All Products</button>
      <button class="tab-btn">Best Sellers</button>
      <button class="tab-btn">New Arrivals</button>
      <button class="tab-btn">About</button>
    </div>

    <div class="section-header">
      <h2><i class="fas fa-th-large"></i> All Products</h2>
    </div>
    <div class="product-grid" id="brandProducts"></div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div>
          <div class="logo" style="margin-bottom: 15px;">
            <div class="logo-icon"><i class="fas fa-african-tree"></i></div>
            <h1>MAKZAZ</h1>
          </div>
          <p style="font-size: 13px; color: var(--text-muted);">Empowering African commerce.</p>
        </div>
        <div><h4>Shop</h4><a href="#">Fashion</a><a href="#">Electronics</a></div>
        <div><h4>Support</h4><a href="#">Help Center</a><a href="#">Shipping</a></div>
        <div><h4>Company</h4><a href="#">About</a><a href="#">Blog</a></div>
      </div>
      <div class="footer-bottom">© 2026 MAKZAZ</div>
    </div>
  </footer>

  <script src="../app.js"></script>
</body>
</html>
