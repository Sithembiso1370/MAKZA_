<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Makzaz</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; }
        .error-content { text-align: center; color: white; max-width: 600px; }
        .error-code { font-size: 120px; font-weight: 700; margin: 0; line-height: 1; text-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .error-title { font-size: 32px; margin: 20px 0; }
        .error-message { font-size: 18px; margin-bottom: 40px; opacity: 0.9; }
        .error-actions { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .error-btn { padding: 15px 30px; border-radius: 30px; text-decoration: none; font-weight: 600; transition: transform 0.3s; display: inline-flex; align-items: center; gap: 10px; }
        .error-btn.primary { background: white; color: #667eea; }
        .error-btn.secondary { background: transparent; color: white; border: 2px solid white; }
        .error-btn:hover { transform: scale(1.05); }
        .error-illustration { width: 200px; height: 200px; margin: 0 auto 30px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .error-illustration i { font-size: 100px; }
        @media (max-width: 768px) { .error-code { font-size: 80px; } .error-title { font-size: 24px; } .error-illustration { width: 150px; height: 150px; } .error-illustration i { font-size: 70px; } }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <div class="error-illustration">
                <i class="fas fa-search-location"></i>
            </div>
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Page Not Found</h2>
            <p class="error-message">Oops! The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
            <div class="error-actions">
                <a href="../index.html" class="error-btn primary">
                    <i class="fas fa-home"></i> Go Home
                </a>
                <a href="contact.html" class="error-btn secondary">
                    <i class="fas fa-headset"></i> Contact Support
                </a>
            </div>
        </div>
    </div>
</body>
</html>
