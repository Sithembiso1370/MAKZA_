<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | MAKZAZ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <header class="header glass">
    <div class="container" style="display: flex; align-items: center; justify-content: space-between;">
      <a href="../index.html" class="logo">
        <div class="logo-icon"><i class="fas fa-african-tree"></i></div>
        <h1>MAKZAZ</h1>
      </a>
    </div>
  </header>

  <main class="container">
    <h1 class="page-title"><i class="fas fa-credit-card"></i> Checkout</h1>
    
    <div class="checkout-container">
      <div class="checkout-form">
        <div class="checkout-section">
          <h3><i class="fas fa-user"></i> Contact Information</h3>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="your@email.com" />
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="+27 XX XXX XXXX" />
          </div>
        </div>

        <div class="checkout-section">
          <h3><i class="fas fa-map-marker-alt"></i> Shipping Address</h3>
          <div class="form-row">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" placeholder="John" />
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" placeholder="Doe" />
            </div>
          </div>
          <div class="form-group">
            <label>Street Address</label>
            <input type="text" placeholder="123 Main Street" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>City</label>
              <input type="text" placeholder="Johannesburg" />
            </div>
            <div class="form-group">
              <label>Postal Code</label>
              <input type="text" placeholder="2000" />
            </div>
          </div>
          <div class="form-group">
            <label>Country</label>
            <select>
              <option>South Africa</option>
              <option>Ghana</option>
              <option>Nigeria</option>
              <option>Kenya</option>
            </select>
          </div>
        </div>

        <div class="checkout-section">
          <h3><i class="fas fa-truck"></i> Delivery Method</h3>
          <div class="delivery-options">
            <label class="delivery-option">
              <input type="radio" name="delivery" checked />
              <span>
                <strong>Standard Delivery</strong>
                <p>3-5 business days</p>
                <span class="price">R 50.00</span>
              </span>
            </label>
            <label class="delivery-option">
              <input type="radio" name="delivery" />
              <span>
                <strong>Express Delivery</strong>
                <p>1-2 business days</p>
                <span class="price">R 120.00</span>
              </span>
            </label>
          </div>
        </div>

        <div class="checkout-section">
          <h3><i class="fas fa-credit-card"></i> Payment Method</h3>
          <div class="payment-methods">
            <label class="payment-option">
              <input type="radio" name="payment" checked />
              <span><i class="fas fa-credit-card"></i> Credit/Debit Card</span>
            </label>
            <label class="payment-option">
              <input type="radio" name="payment" />
              <span><i class="fab fa-paypal"></i> PayPal</span>
            </label>
            <label class="payment-option">
              <input type="radio" name="payment" />
              <span><i class="fas fa-money-bill-wave"></i> Cash on Delivery</span>
            </label>
          </div>
          <div class="card-details">
            <div class="form-group">
              <label>Card Number</label>
              <input type="text" placeholder="XXXX XXXX XXXX XXXX" />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Expiry Date</label>
                <input type="text" placeholder="MM/YY" />
              </div>
              <div class="form-group">
                <label>CVV</label>
                <input type="text" placeholder="123" />
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="order-summary">
        <h3>Order Summary</h3>
        <div class="order-items">
          <div class="order-item">
            <img src="https://picsum.photos/400/300?random=100" alt="Product" />
            <div>
              <h4>African Print Dress</h4>
              <p>Qty: 1</p>
            </div>
            <span>R 899.00</span>
          </div>
          <div class="order-item">
            <img src="https://picsum.photos/400/300?random=100" alt="Product" />
            <div>
              <h4>Beaded Necklace</h4>
              <p>Qty: 2</p>
            </div>
            <span>R 698.00</span>
          </div>
        </div>
        <div class="summary-row">
          <span>Subtotal</span>
          <span>R 1,597.00</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span>R 50.00</span>
        </div>
        <div class="summary-row">
          <span>Discount</span>
          <span>-R 100.00</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span>R 1,547.00</span>
        </div>
        <button class="btn-cart checkout-btn" onclick="showToast('Order placed successfully!')">
          <i class="fas fa-lock"></i> Place Order
        </button>
        <p class="secure-note"><i class="fas fa-shield-alt"></i> Your payment is secure</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">© 2026 MAKZAZ</div>
    </div>
  </footer>

  <script src="../app.js"></script>
</body>
</html>
